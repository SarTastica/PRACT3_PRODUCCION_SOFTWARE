steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Instalar dependencias y herramientas
        run: |
          uv sync
          uv pip install ruff mypy pytest pytest-bdd behave

      - name: 1. Ejecutar Linter (Ruff)
        run: uv run ruff check .

      - name: 2. Verificar formato (Ruff format)
        run: uv run ruff format --check .

      - name: 3. Verificar tipos (Mypy)
        run: uv run mypy .

      - name: 4. Tests Unitarios
        run: uv run pytest core/tests/unit

      - name: 5. Tests de Integración
        run: uv run pytest core/tests/integration

      - name: 6. Tests de BDD
        run: uv run pytest core/tests/behaviour